<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ミラまる＆チャーすけのEVエナジーラン</title>
<style>
  *{
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
}
html,body{
margin:0;
background:linear-gradient(180deg,#d4eefd 0%,#bfe3fb 42%,#eafaf0 100%);
overflow:visible;
min-height:100vh;
position:relative;
/* ⭐中央固定 */
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
}
canvas,
button,
img,
a{
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
button,
a{
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
button:focus,
button:focus-visible,
a:focus,
a:focus-visible{
  outline: none;
}
img{
  -webkit-user-drag: none;
}
canvas{
display:block;
margin:0;
background:#fff;
touch-action:manipulation;
position:relative;
z-index:95;
/* ⭐縦横どっちでも収まるサイズ */
width:min(100vw, calc(100dvh * (960/540)));
height:auto;
}
#titleBg{
  display:none;
}
@media (max-width:900px){
  html,body{
    background:transparent;
    width:100vw;
    min-height:100dvh;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
  }
  canvas{
    background:transparent;
  }
  #titleBg{
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    height:auto;
    display:none;
    pointer-events:none;
    z-index:99999;
  }
}
  /* ===== 演出 ===== */
  .flash{
    position:fixed; inset:0;
    background:rgba(255,0,0,.28);
    opacity:0; pointer-events:none;
    transition:opacity .15s;
    z-index:120;
  }
  .flash.show{ opacity:1; }
  .fever{
    position:fixed; inset:0;
    opacity:0; pointer-events:none;
    z-index:115;
    /* 中央は明るく抜けて、ふちに虹がにじむ（プレイは見やすいまま華やか） */
    background:
      radial-gradient(circle at 50% 48%, rgba(255,255,255,0) 38%, rgba(255,255,255,.18) 70%, rgba(255,255,255,0) 100%),
      linear-gradient(120deg,
        rgba(255,90,90,.16),
        rgba(255,210,60,.15),
        rgba(90,210,120,.14),
        rgba(77,184,255,.14),
        rgba(176,123,255,.15),
        rgba(255,90,90,.16));
    background-size: 100% 100%, 300% 300%;
    animation: rainbowMove 6s ease-in-out infinite, feverPulse 1.2s ease-in-out infinite;
    transition: opacity .25s ease;
    mix-blend-mode: screen;
  }
  .fever.show{ opacity:1; }
  @keyframes rainbowMove{
    0%{ background-position:50% 50%, 0% 50%; }
    50%{ background-position:50% 50%, 100% 50%; }
    100%{ background-position:50% 50%, 0% 50%; }
  }
  @keyframes feverPulse{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.18); }
  }
  /* ===== HUD ===== */
  .hud{
    position:fixed; left:12px; top:12px;
    display:none; gap:8px; flex-wrap:wrap;
    z-index:25;
    user-select:none;
  }
  .hud.show{ display:flex; }
  .pill{
    background:rgba(255,255,255,.86);
    backdrop-filter: blur(4px);
    border:1px solid rgba(0,0,0,.08);
    border-radius:999px;
    padding:8px 10px;
    font-size:13px;
    font-weight:900;
    color:#111;
    display:flex; align-items:center; gap:8px;
  }
  .tiny{ font-size:12px; color:#333; font-weight:900; }
  .feverBadge{
    display:none;
    animation: pulse .8s ease-in-out infinite;
  }
  .feverBadge.on{ display:flex; }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  .hp-pop{ animation: hpPop .28s ease; }
  @keyframes hpPop{ 0%{transform:scale(1);} 50%{transform:scale(1.35);} 100%{transform:scale(1);} }
  /* ローディング表示（EVバッテリー充電風） */
  .loading{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px;
    z-index:50;
    color:#2b3a55;
    font-weight:900;
    background:linear-gradient(180deg,#d4eefd 0%,#bfe3fb 45%,#eafaf0 100%);
  }
  .loading .batt{
    position:relative;
    width:128px; height:62px;
    border:5px solid #2b3a55;
    border-radius:12px;
    background:rgba(255,255,255,.6);
    box-shadow:0 6px 16px rgba(43,58,85,.18);
    overflow:hidden;
  }
  .loading .batt::after{
    content:"";
    position:absolute;
    right:-12px; top:50%; transform:translateY(-50%);
    width:9px; height:24px;
    background:#2b3a55;
    border-radius:0 4px 4px 0;
  }
  .loading .batt .fill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    background:linear-gradient(90deg,#ffd93b,#5ad27a);
    animation:battCharge 1.6s ease-in-out infinite;
  }
  .loading .batt .bolt{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:30px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));
  }
  @keyframes battCharge{
    0%{ width:0%; }
    70%{ width:100%; }
    100%{ width:100%; opacity:.85; }
  }
  .loading .txt{
    font-size:17px; letter-spacing:1px;
  }
  .loading .txt::after{
    content:"";
    animation:loadingDots 1.2s steps(4,end) infinite;
  }
  @keyframes loadingDots{
    0%{ content:""; }
    25%{ content:"・"; }
    50%{ content:"・・"; }
    75%{ content:"・・・"; }
  }
  .bigTime{
  position:fixed;
  right:16px;
  top:12px;
  z-index:30;
  font-size:56px;
  font-weight:900;
  color:#111;
  background:rgba(255,255,255,.8);
  padding:8px 16px;
  border-radius:16px;
  display:none;
}
.bigTime.show{
  display:block;
}
/* ======================
  ⭐ 右上 閉じるボタン
====================== */
.closeBtn{
  position:fixed;
  right:12px;
  top:12px;
  z-index:999;
  width:44px;
  height:44px;
  border-radius:999px;
  border:none;
  background:rgba(0,0,0,.25);
  color:#fff;
  font-size:24px;
  font-weight:900;
  display:none;
}
.closeBtn.show{
  display:block;
}
.closeBtn:active{
  transform:scale(0.94);
  filter:brightness(0.95);
}
/* 音の切り替えトグル（×の隣） */
.soundToggle{
  position:fixed;
  right:64px;
  top:12px;
  z-index:999;
  width:44px;
  height:44px;
  border-radius:999px;
  border:none;
  background:rgba(0,0,0,.25);
  display:none;
  align-items:center;
  justify-content:center;
  padding:0;
}
.soundToggle.show{
  display:flex;
}
.soundToggle:active{
  transform:scale(0.94);
  filter:brightness(0.95);
}
.soundToggle svg{ width:24px; height:24px; }
/* スマホは右上アイコンをもう少し上へ */
@media (max-width:900px){
  .closeBtn{ top:4px; }
  .soundToggle{ top:4px; }
}
.shareTapBtn{
  position:fixed;
  display:none;
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  z-index:130;
}
.shareTapBtn:active{
  transform:scale(0.94);
}
#titleStartBtn:active{
  transform:translateX(-50%) scale(0.96);
  filter:brightness(0.97);
}
.middle-image,
.middle-video{
  position:absolute;
  left:42px;
  right:42px;
  top:308px;
  width:calc(100% - 84px);
  margin:0;
  padding:0;
  display:block;
  object-fit:cover;
  box-sizing:border-box;
  z-index:140;
  pointer-events:none;
}
.middle-image,
.middle-video{
  display:none;
}
.game-jump-btn{
  position:absolute;
  display:none;
  pointer-events:auto;
  user-select:none;
  -webkit-user-drag:none;
  z-index:111;
}
</style>
</head>

  bg: "background.jpg",

  title_logo: "title_logo.png", // ★ 新タイトルロゴ（透過PNG）

  ※あなたの指定をそのまま反映
========================================================= */

};
/* =========================================================
  4) Canvas / DOM
========================================================= */
const canvas = document.getElementById("game");

const titleBg = document.getElementById("titleBg");
const titleBgLoop = document.getElementById("titleBgLoop");
let titleBgLoopA = null;
let titleBgLoopB = null;
if(titleBgLoop){
  titleBgLoopA = document.createElement("div");
  titleBgLoopB = document.createElement("div");

const ctx = canvas.getContext("2d");

let groundY = 0;
let mobileFrameRect = null;
let canvasPressFx = null; // Canvas上ボタンの押下ハイライト
let pcCourseHoverMode = null; // "mm" | "ch" | null
let pcSoundHover = null;       // "ok" | "no" | null（音選択ボタンのホバー）
canvas.style.touchAction = "none";
// iOS Safari: ゲーム中のダブルタップ/ピンチでページ拡大されるのを防ぐ
const _isMobile = detectMobile(); // 1回だけ判定
let lastTouchEndAt = 0;
document.addEventListener("touchend",(e)=>{
  if(!_isMobile) return;
  const now = Date.now();
  if(now - lastTouchEndAt < 300){
    e.preventDefault();
  }
  lastTouchEndAt = now;
},{ passive:false });
document.addEventListener("gesturestart",(e)=>{
  if(!_isMobile) return;
  e.preventDefault();
},{ passive:false });
document.addEventListener("touchmove",(e)=>{
  if(!_isMobile) return;
  if(e.touches && e.touches.length > 1){
    e.preventDefault();

  const assetKey = MOBILE_FOOTER_BTN_BY_STATE[stateKey];
  if(!assetKey) return null;
  const full = getMobileFooterButtonRect(assetKey);
  const leftW = full.w * 0.20; // 左ボタン（戻る/ホーム）
  const gap = full.w * 0.06;   // 間の余白
  return {
    full,
    left: { x: full.x, y: full.y, w: leftW, h: full.h },
    main: { x: full.x + leftW + gap, y: full.y, w: full.w - leftW - gap, h: full.h }
  };
}
function getPcFooterButtonRect(assetKey){
  if(isMobile()) return null;
  const imgObj = I[assetKey];
  const maxW = canvas.width * 0.62;
  let w = maxW;
  let h = canvas.height * 0.14;
  if(imgObj?.ok && imgObj.img.naturalWidth && imgObj.img.naturalHeight){
    h = w * (imgObj.img.naturalHeight / imgObj.img.naturalWidth);
  }
  const maxH = canvas.height * 0.22;
  if(h > maxH){
    const s = maxH / h;
    h *= s;
    w *= s;
  }
  const x = (canvas.width - w) / 2;
  const y = canvas.height - h - canvas.height * 0.035;
  return { x, y, w, h };
}
function getPcFooterButtonHitAreas(stateKey){
  if(isMobile()) return null;
  const assetKey = getPcFooterButtonAssetByState(stateKey);
  const main = assetKey ? getPcFooterButtonRect(assetKey) : null;
  if(!main) return null;
  // PCの左青ボタン（戻る/ホーム）は背景画像側に含まれているため、右のオレンジボタン基準で推定
  if(stateKey === STATE.COURSE || stateKey === STATE.START || stateKey === STATE.END){
    const leftSize = main.h * 0.95;
    const gap = canvas.width * 0.012;
    const leftShift = (stateKey === STATE.COURSE || stateKey === STATE.START)
      ? (canvas.width * 0.022)
      : 0;
    const left = {
      // 青ボタンはオレンジの左隣。1個分左にズレていたので右へ補正
      x: main.x - gap + (canvas.width * 0.004) - leftShift,
      y: main.y + (main.h - leftSize) / 2,
      w: leftSize,
      h: leftSize
    };
    // 右オレンジボタンの判定は少し右へ寄せて、青ボタン側にかぶらないようにする
    const mainAdjusted = {
      x: main.x + (canvas.width * 0.01),
      y: main.y,
      w: main.w - (canvas.width * 0.01),
      h: main.h
    };
    return { left, main: mainAdjusted };
  }
  return { main };
}

function drawPcCourseSelectionOverlay(){
  if(isMobile() || state !== STATE.COURSE) return;
  const rects = getPcCourseChoiceRects();
  if(!rects) return;
  const drawSelectedFrame = (rect)=>{
    const outerPad = 10;
    const innerPad = 2;
    ctx.save();
    ctx.lineJoin = "round";
    // 外側の白枠
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 8;
    ctx.strokeRect(
      rect.x - outerPad,
      rect.y - outerPad,
      rect.w + outerPad * 2,
      rect.h + outerPad * 2
    );
    // 内側の黄色枠
    ctx.strokeStyle = "rgba(255,220,0,0.98)";
    ctx.lineWidth = 5;
    ctx.strokeRect(
      rect.x - innerPad,
      rect.y - innerPad,
      rect.w + innerPad * 2,
      rect.h + innerPad * 2
    );
    // 「選択中」バッジ
    const badgeW = Math.min(rect.w * 0.42, 128);
    const badgeH = 42;
    const badgeX = rect.x + rect.w - badgeW - 8;
    const badgeY = rect.y + 10;
    ctx.fillStyle = "rgba(238,238,238,0.98)";
    ctx.strokeStyle = "rgba(150,160,170,0.95)";
    ctx.lineWidth = 3;
    if(ctx.roundRect){
      ctx.beginPath();
      ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 12);
      ctx.fill();
      ctx.stroke();
    }else{
      ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
      ctx.strokeRect(badgeX, badgeY, badgeW, badgeH);
    }
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "900 24px sans-serif";
    ctx.fillStyle = "#1460d2";
    ctx.fillText("選択中", badgeX + badgeW/2, badgeY + badgeH/2 + 1);
    ctx.restore();
  };
  if(mode === "mm"){
    drawSelectedFrame(rects.mm);
  }else if(mode === "ch"){
    drawSelectedFrame(rects.ch);
  }
}

// ★ 画像ボタンをアスペクト維持で矩形内に収めて描く
function drawImageButton(imgObj, rect){
  if(!imgObj?.ok || !rect) return;
  const iw = imgObj.img.naturalWidth, ih = imgObj.img.naturalHeight;
  if(!iw || !ih) return;
  const s = Math.min(rect.w / iw, rect.h / ih);
  const w = iw * s, h = ih * s;
  ctx.drawImage(imgObj.img, rect.x + (rect.w - w)/2, rect.y + (rect.h - h)/2, w, h);
}
// ★ コードで描く立体ボタン（画像不要）
//   角丸＋グラデ＋下の濃いエッジ（3D感）＋白フチ＋テキスト。hover/press対応。
function drawCodeButton(rect, label, opts){
  opts = opts || {};
  const bg1 = opts.bg1 || "#7ee08a";
  const bg2 = opts.bg2 || "#37bf57";
  const edge = opts.edge || "#268f3e";
  const textColor = opts.textColor || "#ffffff";
  const hover = !!opts.hover;
  const press = !!opts.press;
  const { x, y, w, h } = rect;
  ctx.save();
  // hoverで少し拡大、pressで少し沈む
  const sc = hover ? 1.05 : 1;
  const sink = press ? h * 0.05 : 0;
  const cx = x + w/2;
  const cy = y + h/2;
  ctx.translate(cx, cy + sink);
  ctx.scale(sc, sc);
  ctx.translate(-cx, -cy);
  const lip = press ? h * 0.07 : h * 0.18; // ★ 下の立体エッジを厚く（ぷっくり）
  const faceH = h - lip;
  const r = Math.min(faceH, w) * 0.48;      // ★ ほぼ角丸MAXでぷっくり
  // 影
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.24)";
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 11;
  roundRect(ctx, x, y + lip, w, faceH, r);
  ctx.fillStyle = edge;
  ctx.fill();
  ctx.restore();
  // 表面（縦グラデ：上を明るく）
  const g = ctx.createLinearGradient(0, y, 0, y + faceH);
  g.addColorStop(0, bg1);
  g.addColorStop(0.55, bg2);
  g.addColorStop(1, bg2);
  roundRect(ctx, x, y, w, faceH, r);
  ctx.fillStyle = g;
  ctx.fill();
  // ★ 上半分のツヤ（ぷっくりした光沢）
  ctx.save();
  roundRect(ctx, x, y, w, faceH, r);
  ctx.clip();
  const gloss = ctx.createLinearGradient(0, y, 0, y + faceH * 0.55);
  gloss.addColorStop(0, "rgba(255,255,255,0.55)");
  gloss.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = gloss;
  const inset = w * 0.06;
  roundRect(ctx, x + inset, y + faceH * 0.10, w - inset*2, faceH * 0.42, faceH * 0.30);
  ctx.fill();
  ctx.restore();
  // 白フチ（太め）
  ctx.lineWidth = Math.max(3, h * 0.06);
  ctx.strokeStyle = "rgba(255,255,255,0.96)";
  roundRect(ctx, x, y, w, faceH, r);
  ctx.stroke();
  // アイコン＋テキスト
  const cyTxt = y + (h - lip)/2;
  const fs = Math.floor((h - lip) * 0.40);
  const icon = opts.icon || null;
  const iconSize = (h - lip) * 0.46;
  const hasLabel = !!(label && label.length);
  ctx.font = `900 ${fs}px system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif`;
  ctx.textBaseline = "middle";
  if(icon && hasLabel){
    const tw = ctx.measureText(label).width;
    const pad = iconSize * 0.4;
    const totalW = iconSize + pad + tw;
    const sx = x + (w - totalW)/2;
    drawIcon(icon, sx + iconSize/2, cyTxt, iconSize, textColor);
    ctx.textAlign = "left";
    ctx.lineWidth = Math.max(4, fs * 0.16);
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.strokeText(label, sx + iconSize + pad, cyTxt + 1);
    ctx.fillStyle = textColor;
    ctx.fillText(label, sx + iconSize + pad, cyTxt + 1);
  }else if(icon){
    drawIcon(icon, x + w/2, cyTxt, iconSize, textColor);
  }else{
    ctx.textAlign = "center";
    ctx.lineWidth = Math.max(4, fs * 0.16);
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.strokeText(label, x + w/2, cyTxt + 1);
    ctx.fillStyle = textColor;
    ctx.fillText(label, x + w/2, cyTxt + 1);
  }
  ctx.restore();
}
// ★ 白のコードアイコン（絵文字の代わり）
function drawIcon(type, cx, cy, s, color){
  const r = s/2;
  ctx.save();
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, s*0.14);
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  if(type === "play"){
    ctx.beginPath();
    ctx.moveTo(cx - r*0.55, cy - r*0.85);
    ctx.lineTo(cx + r*0.85, cy);
    ctx.lineTo(cx - r*0.55, cy + r*0.85);
    ctx.closePath(); ctx.fill();
  }else if(type === "up"){
    ctx.beginPath(); // 上向き三角（ジャンプ）
    ctx.moveTo(cx, cy - r*0.85);
    ctx.lineTo(cx + r*0.85, cy + r*0.55);
    ctx.lineTo(cx - r*0.85, cy + r*0.55);
    ctx.closePath(); ctx.fill();
  }else if(type === "back"){
    ctx.beginPath();
    ctx.moveTo(cx + r*0.55, cy - r*0.85);
    ctx.lineTo(cx - r*0.85, cy);
    ctx.lineTo(cx + r*0.55, cy + r*0.85);
    ctx.closePath(); ctx.fill();
  }else if(type === "home"){
    ctx.beginPath(); // 屋根
    ctx.moveTo(cx, cy - r*0.95);
    ctx.lineTo(cx + r*0.95, cy - r*0.05);
    ctx.lineTo(cx - r*0.95, cy - r*0.05);
    ctx.closePath(); ctx.fill();
    const bw = r*1.25, bh = r*0.9;
    ctx.fillRect(cx - bw/2, cy - r*0.05, bw, bh); // 本体
  }else if(type === "retry"){
    ctx.beginPath();
    ctx.arc(cx, cy, r*0.78, Math.PI*0.45, Math.PI*2.05);
    ctx.stroke();
    const ax = cx + Math.cos(Math.PI*0.45)*r*0.78;
    const ay = cy + Math.sin(Math.PI*0.45)*r*0.78;
    ctx.beginPath(); // 矢印
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - s*0.22, ay + s*0.02);
    ctx.lineTo(ax + s*0.02, ay + s*0.24);
    ctx.closePath(); ctx.fill();
  }else if(type === "sound_on" || type === "sound_off"){
    ctx.beginPath(); // スピーカー
    ctx.moveTo(cx - r*0.75, cy - r*0.35);
    ctx.lineTo(cx - r*0.25, cy - r*0.35);
    ctx.lineTo(cx + r*0.15, cy - r*0.75);
    ctx.lineTo(cx + r*0.15, cy + r*0.75);
    ctx.lineTo(cx - r*0.25, cy + r*0.35);
    ctx.lineTo(cx - r*0.75, cy + r*0.35);
    ctx.closePath(); ctx.fill();
    if(type === "sound_on"){
      ctx.beginPath(); ctx.arc(cx + r*0.1, cy, r*0.55, -Math.PI*0.4, Math.PI*0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + r*0.1, cy, r*0.9, -Math.PI*0.4, Math.PI*0.4); ctx.stroke();
    }else{
      ctx.beginPath();
      ctx.moveTo(cx + r*0.5, cy - r*0.45); ctx.lineTo(cx + r*1.0, cy + r*0.45);
      ctx.moveTo(cx + r*1.0, cy - r*0.45); ctx.lineTo(cx + r*0.5, cy + r*0.45);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function getMobileSoundChoiceRects(){
  const bh = canvas.height * BTN_H_RATIO;
  if(isLandscapeStage()){
    // 横長：左右に2つ（パネル直下）
    const bw = canvas.width * 0.42;
    const gap = canvas.width * 0.04;
    const total = bw * 2 + gap;
    const x0 = (canvas.width - total) / 2;
    const y = getButtonRowTop();
    return {
      on:  { x: x0,            y, w: bw, h: bh },
      off: { x: x0 + bw + gap, y, w: bw, h: bh }
    };
  }
  // 縦長：縦並び・最下部寄せ
  const bw = canvas.width * BTN_W_RATIO;
  const bx = (canvas.width - bw) / 2;
  const gap = canvas.height * 0.018;
  const total = bh * 2 + gap;
  const y0 = canvas.height * 0.94 - total;
  return {
    on:  { x: bx, y: y0,            w: bw, h: bh },
    off: { x: bx, y: y0 + bh + gap, w: bw, h: bh }
  };
}

function getMobileEndShareRectsScreen(){
  if(!isMobile()) return null;
  const layerRect = mobileLayer?.getBoundingClientRect?.();
  if(!layerRect || !layerRect.width || !layerRect.height) return null;
  const srcW = mobileLayer.naturalWidth || canvas.width;
  const srcH = mobileLayer.naturalHeight || canvas.height;
  if(!srcW || !srcH) return null;
  // mobileLayer は cover + center bottom で表示しているため、実表示中の画像領域を算出する
  const scale = Math.max(layerRect.width / srcW, layerRect.height / srcH);
  const drawW = srcW * scale;
  const drawH = srcH * scale;
  const imageRect = {
    left: layerRect.left + (layerRect.width - drawW) / 2,
    top: layerRect.top + (layerRect.height - drawH), // center bottom
    width: drawW,
    height: drawH
  };
  const panel = {
    x: imageRect.width * 0.05,
    y: imageRect.height * 0.28,
    w: imageRect.width * 0.90,
    h: imageRect.height * 0.52
  };
  const shareY = panel.y + panel.h * 0.70;
  const scaleX = imageRect.width / canvas.width;
  const scaleY = imageRect.height / canvas.height;
  const btnSize = 70 * Math.min(scaleX, scaleY);
  const gap = 24 * scaleX;
  const center = imageRect.width / 2;
  const hitPad = Math.max(10, btnSize * 0.20); // 少し広めに取る
  return {
    x: {
      x: imageRect.left + center - gap/2 - btnSize - hitPad/2,
      y: imageRect.top + shareY - btnSize/2 - hitPad/2,
      w: btnSize + hitPad,
      h: btnSize + hitPad
    },
    line: {
      x: imageRect.left + center + gap/2 - hitPad/2,
      y: imageRect.top + shareY - btnSize/2 - hitPad/2,
      w: btnSize + hitPad,
      h: btnSize + hitPad
    }
  };
}
function tryHandleMobileEndShareTap(e){
  if(!isMobile() || state !== STATE.END) return false;
  const rects = getMobileEndShareRectsScreen();
  if(!rects) return false;
  const px = e.clientX;
  const py = e.clientY;
  const now = performance.now();
  if(now - (window.__lastShareTapAt || 0) < 450) return false;
  if(hitRect(rects.x, px, py)){
    window.__lastShareTapAt = now;
    shareToX();
    return true;
  }
  if(hitRect(rects.line, px, py)){
    window.__lastShareTapAt = now;
    shareToLINE();
    return true;
  }
  return false;
}
function drawMobileCourseSelectionOverlay(){
  if(!isMobile() || state !== STATE.COURSE) return;
  const rects = getMobileCourseChoiceRects();
  const selectedRect = mode === "mm" ? rects.mm : (mode === "ch" ? rects.ch : null);
  ctx.save();
  if(!selectedRect){
    const footer = getMobileFooterButtonHitAreas(STATE.COURSE);
    if(footer?.main){
      const dimRect = {
        x: footer.main.x + footer.main.w * 0.06,
        y: footer.main.y + footer.main.h * 0.04,
        w: footer.main.w * 0.93,
        h: footer.main.h * 0.72
      };
      ctx.fillStyle = "rgba(255,255,255,0.36)";
      if(ctx.roundRect){
        ctx.beginPath();
        ctx.roundRect(dimRect.x, dimRect.y, dimRect.w, dimRect.h, 22);
        ctx.fill();
      }else{
        ctx.fillRect(dimRect.x, dimRect.y, dimRect.w, dimRect.h);
      }
    }
    ctx.restore();
    return;
  }
  // 選択中カードを強調表示
  const outerPad = 12;
  const innerPad = 10;
  const isMmSelected = mode === "mm";
  const outerLeftExtra = isMmSelected ? 14 : 0;
  const outerRightExtra = isMmSelected ? 0 : 14;
  const innerLeftExtra = isMmSelected ? 14 : 0;
  const innerRightExtra = isMmSelected ? 0 : 14;
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 12;
  ctx.strokeRect(
    selectedRect.x - outerPad - outerLeftExtra,
    selectedRect.y - outerPad,
    selectedRect.w + outerPad * 2 + outerLeftExtra + outerRightExtra,
    selectedRect.h + outerPad * 2
  );
  ctx.strokeStyle = "rgba(255,215,0,0.95)";
  ctx.lineWidth = 6;
  ctx.strokeRect(
    selectedRect.x - innerPad - innerLeftExtra,
    selectedRect.y - innerPad,
    selectedRect.w + innerPad * 2 + innerLeftExtra + innerRightExtra,
    selectedRect.h + innerPad * 2
  );
  // ラベル
  const badgeW = selectedRect.w * 0.46;
  const badgeH = selectedRect.h * 0.14;
  const badgeX = selectedRect.x + selectedRect.w - badgeW - 12;
  const badgeY = selectedRect.y + 12;
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.strokeStyle = "rgba(0,0,0,0.25)";
  ctx.lineWidth = 3;
  if(ctx.roundRect){
    ctx.beginPath();
    ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 14);
    ctx.fill();
    ctx.stroke();
  }else{
    ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
    ctx.strokeRect(badgeX, badgeY, badgeW, badgeH);
  }
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#0d56d8";
  ctx.font = "900 24px sans-serif";
  ctx.fillText("選択中", badgeX + badgeW/2, badgeY + badgeH/2 + 1);
  ctx.restore();
}

    const rects = getPcCourseChoiceRects();

    else if(rects && hitRect(rects.ch, x, y)){ pcCourseHoverMode = "ch"; onBtn = true; }

  }else{
    pcCourseHoverMode = null;

    else if(sr && hitRect(sr.no, x, y)){ pcSoundHover = "no"; onBtn = true; }
    else pcSoundHover = null;
  }else{
    pcSoundHover = null;
  }

});

canvas.addEventListener("pointerdown",(e)=>{
  unlockAudioOnce();
  if(tryHandleMobileEndShareTap(e)) return;
  const { x, y } = getPointerXY(e);
  if(!isMobile()){
    if(state === STATE.END){
      const pcFooterAreas = getPcFooterButtonHitAreas(STATE.END);
      if(pcFooterAreas?.left && hitRect(pcFooterAreas.left, x, y)){
        if(isEndFooterLocked()) return;
        triggerCanvasPressFx(pcFooterAreas.left);
        stopBgm();
        state = STATE.SOUND; // 赤枠: 音あり/音なし選択画面
        return;
      }
      if(pcFooterAreas?.main && hitRect(pcFooterAreas.main, x, y)){
        if(isEndFooterLocked()) return;
        triggerCanvasPressFx(pcFooterAreas.main);
        stopBgm();
        state = STATE.COURSE; // 黒枠: コース選択画面
        return;
      }
    }
    if(state === STATE.SOUND){
      const soundRects = getPcSoundChoiceRects();
      if(soundRects && hitRect(soundRects.ok, x, y)){
        triggerCanvasPressFx(soundRects.ok);
        soundOn = true;
        state = STATE.TITLE;
        // 次画面遷移後にBGM開始
        requestAnimationFrame(()=>playBgm("bgm_common_intro.mp3"));
        return;
      }
      if(soundRects && hitRect(soundRects.no, x, y)){
        triggerCanvasPressFx(soundRects.no);
        soundOn = false;
        stopBgm();
        state = STATE.TITLE;
        return;
      }
    }
    const pcFooterAreas = getPcFooterButtonHitAreas(state);
    const pcFooterRect = pcFooterAreas?.main || null;
    if(state === STATE.TITLE && pcFooterRect && hitRect(pcFooterRect, x, y)){
      triggerCanvasPressFx(pcFooterRect);
      state = STATE.COURSE;
      return;
    }
    if(state === STATE.COURSE && pcFooterAreas?.left && hitRect(pcFooterAreas.left, x, y)){
      triggerCanvasPressFx(pcFooterAreas.left);
      state = STATE.TITLE; // 前の画面へ戻る
      return;
    }
    if(state === STATE.COURSE && pcFooterRect && hitRect(pcFooterRect, x, y)){
      triggerCanvasPressFx(pcFooterRect);
      if(!mode) return;
      state = STATE.START;
      return;
    }
    if(state === STATE.START && pcFooterAreas?.left && hitRect(pcFooterAreas.left, x, y)){
      triggerCanvasPressFx(pcFooterAreas.left);
      state = STATE.COURSE; // 前の画面へ戻る
      return;
    }
    if(state === STATE.START && pcFooterRect && hitRect(pcFooterRect, x, y)){
      triggerCanvasPressFx(pcFooterRect);
      startBtnPressUntil = performance.now() + 120;
      setTimeout(()=>{ startGame(); },120);
      return;
    }
  }
  if(isMobile()){
    const footerHit = getMobileFooterButtonHitAreas(state);
    if(footerHit){
      // TITLE: ゲームで遊ぶボタン（全体）→ 次画面へ
      if(state === STATE.TITLE && hitRect(footerHit.full, x, y)){
        pressThen("f_main_"+STATE.TITLE, ()=>{ state = STATE.COURSE; });
        return;
      }
      // COURSE: 左で戻る
      if(state === STATE.COURSE && hitRect(footerHit.left, x, y)){
        pressThen("f_left_"+STATE.COURSE, ()=>{ state = STATE.TITLE; });
        return;
      }
      // COURSE: 決定→スタート画面
      if(state === STATE.COURSE && hitRect(footerHit.main, x, y)){
        if(!mode) return;
        pressThen("f_main_"+STATE.COURSE, ()=>{ state = STATE.START; });
        return;
      }
      // START: 左で戻る
      if(state === STATE.START && hitRect(footerHit.left, x, y)){
        pressThen("f_left_"+STATE.START, ()=>{ state = STATE.COURSE; });
        return;
      }
      // START: ゲーム開始
      if(state === STATE.START && hitRect(footerHit.full, x, y)){
        pressThen("f_main_"+STATE.START, ()=>{ startGame(); });
        return;
      }
      // END: ホームへ
      if(state === STATE.END && hitRect(footerHit.left, x, y)){
        if(isEndFooterLocked()) return;
        pressThen("f_left_"+STATE.END, ()=>{ stopBgm(); state = STATE.TITLE; });
        return;
      }
      // END: もう一度あそぶ
      if(state === STATE.END && hitRect(footerHit.main, x, y)){
        if(isEndFooterLocked()) return;
        pressThen("f_main_"+STATE.END, ()=>{ stopBgm(); state = STATE.START; });
        return;
      }
    }
  }
  // ==========================
// ⭐ タイトル動画タップ（スマホだけ）
// ==========================
// ⭐ スマホタイトル → スタートボタン判定
if(state === STATE.TITLE && isMobile()){
  // タイトル画面は下部ボタンで進む（全体タップでは進まない）
  return;
}
if(state === STATE.TITLE && !isMobile()){
  // PCタイトルは下部中央ボタンでのみ進む
  return;
}
  // ==========================
// 🔊 音あり / 音なし選択
// ==========================
  if (state === STATE.SOUND) {
  if (isMobile()) {
    const soundChoice = getMobileSoundChoiceRects();
    if (hitRect(soundChoice.on, x, y)) {
      // ★ 音声は操作直後（ジェスチャー内）に開始してアンロックする
      unlockAudioOnce();
      soundOn = true;
      playBgm("bgm_common_intro.mp3");
      pressThen("snd_on", ()=>{ state = STATE.TITLE; });
      return;
    }
    if (hitRect(soundChoice.off, x, y)) {
      soundOn = false;
      stopBgm();
      pressThen("snd_off", ()=>{ state = STATE.TITLE; }, null);
      return;
    }
  } else {
    // PCは上でフッターボタン判定済み（SOUND→TITLE）
  }
  return;
}
  // ② コース選択（左=ミラまる、右=チャーすけ）
if(state===STATE.COURSE){
  if(isMobile()){
    const courseRects = getMobileCourseChoiceRects();
    if(hitRect(courseRects.mm, x, y)){
      triggerCanvasPressFx(courseRects.mm);
      mode = "mm";
    }else if(hitRect(courseRects.ch, x, y)){
      triggerCanvasPressFx(courseRects.ch);
      mode = "ch";
    }
    return;
  }else{
    // PCは左右でコース選択のみ（開始は下部中央のbtn_course）
    const courseRects = getPcCourseChoiceRects();
    if(courseRects && hitRect(courseRects.mm, x, y)){
      mode = "mm";
      return;
    }else if(courseRects && hitRect(courseRects.ch, x, y)){
      mode = "ch";
      return;
    }
    return;
  }
}
  // ③ スタート（画像UI：中央のボタン範囲）
  if(state===STATE.START){
  if(isMobile()){
    // スマホSTARTは下部btn_startでのみ開始
    return;
  }
  // PC STARTも下部中央ボタンで開始
  return;
}
  // ④ ゲーム中：ジャンプ
  if(state===STATE.GAME){
  // ⭐ JUMPボタン押したかチェック
  if((SHOW_JUMP_BUTTON_MOBILE || isMobile()) && jumpBtnRect){
  if(
    x > jumpBtnRect.x &&
    x < jumpBtnRect.x + jumpBtnRect.w &&
    y > jumpBtnRect.y &&
    y < jumpBtnRect.y + jumpBtnRect.h
  ){
    triggerCanvasPressFx(jumpBtnRect);
    jumpBtnPressUntil = performance.now() + 120; // ←0.12秒へこむ
    jump();
    return;
  }
}
  // PCは画面クリックでジャンプ。スマホはジャンプボタン範囲のみでジャンプ
  if(!isMobile()){
    jump();
  }
  return;
}
  // ⑤ 終了画面：もう一度 / やめる
if(state===STATE.END){
  if(!isMobile()){
    if(hitRect(BTN.shareX, x, y)){
      shareToX();
      return;
    }
    if(hitRect(BTN.shareLINE, x, y)){
      shareToLINE();
      return;
    }
  }
  if(isMobile()){
    // 画像内のX/LINEアイコン用: 広めのフォールバック領域（スマホEND）
    if(state === STATE.END){
      const fallbackShareX = {
        x: canvas.width * 0.28,
        y: canvas.height * 0.67,
        w: canvas.width * 0.18,
        h: canvas.height * 0.14
      };
      const fallbackShareLINE = {
        x: canvas.width * 0.50,
        y: canvas.height * 0.67,
        w: canvas.width * 0.20,
        h: canvas.height * 0.14
      };
      if(hitRect(fallbackShareX, x, y)){
        shareToX();
        return;
      }
      if(hitRect(fallbackShareLINE, x, y)){
        shareToLINE();
        return;
      }
    }
    const xRect = BTN.shareX ? {
      x: BTN.shareX.x - 18,
      y: BTN.shareX.y - 18,
      w: BTN.shareX.w + 36,
      h: BTN.shareX.h + 36
    } : null;
    const lineRect = BTN.shareLINE ? {
      x: BTN.shareLINE.x - 18,
      y: BTN.shareLINE.y - 18,
      w: BTN.shareLINE.w + 36,
      h: BTN.shareLINE.h + 36
    } : null;
    if(xRect && hitRect(xRect, x, y)){
      shareToX();
      return;
    }
    if(lineRect && hitRect(lineRect, x, y)){
      shareToLINE();
      return;
    }
    // スマホENDは下部ボタン（家 / もう一度遊ぶ）も使用
    return;
  }else{
    // PC ENDは下部中央btn_retryで再開（上で判定）
  }
}

/* 当たり判定（安定版） */
function hit(a, b){
  const marginA = 14;
  const marginB = 10;
  return (
    a.x + marginA < b.x + b.w - marginB &&
    a.x + a.w - marginA > b.x + marginB &&
    a.y + marginA < b.y + b.h - marginB &&
    a.y + a.h - marginA > b.y + marginB
  );
}
// 敵だけはスマホ時の見た目拡大分を少し相殺して、理不尽な接触を減らす
function hitEnemy(a, b){
  const marginA = isMobile() ? 20 : 14;
  const marginB = isMobile() ? 18 : 10;
  return (
    a.x + marginA < b.x + b.w - marginB &&
    a.x + a.w - marginA > b.x + marginB &&
    a.y + marginA < b.y + b.h - marginB &&
    a.y + a.h - marginA > b.y + marginB
  );
}

function decideGameEvent(){
  const fever = (playCount % 15 === 0);              // 15ゲームに1回
  const bigLightning = (!fever && playCount % 10 === 0); // 10ゲームに1回
  const rare5 = (!fever && playCount % 5 === 0);     // 5ゲームに1回（モードのレア枠）
  return { fever, bigLightning, rare5 };
}
/* フィーバー */
function startFever(){
  const t = performance.now();
  feverUntil = t + 15200; // フィーバーBGM/演出をさらに約5秒延長（合計約15秒）
  feverLayer.classList.add("show");
  // ⭐ここで stopBgm しない
  // （playBgm が完全停止管理するから）
  if(soundOn){
  // ⭐通常BGMを一時停止（止めない）
  if(bgm){
    try{ bgm.pause(); }catch(e){}
  }
  feverBgm = new Audio("bgm_fever.mp3");
  const currentFeverBgm = feverBgm;
  feverBgm.loop = true;
  feverBgm.volume = 0.7;
  feverBgm.playsInline = true;
  feverBgm.setAttribute("playsinline","");
  feverBgm.setAttribute("webkit-playsinline","");
  // iOSなどで loop が不安定な場合に保険で再生継続
  feverBgm.addEventListener("ended", ()=>{
    if(feverBgm !== currentFeverBgm) return;
    if(performance.now() < feverUntil){
      try{
        feverBgm.currentTime = 0;
        const p = feverBgm.play();
        if(p && p.catch){
          p.catch(()=>{
            feverUntil = performance.now();
          });
        }
        return;
      }catch(e){
        feverUntil = performance.now();
      }
    }
  });
  feverBgm.play().catch(()=>{});
}
  say("🌈 フィーバー突入！",1100);
}
function endFeverNow(){
  feverLayer.classList.remove("show");
  if(feverBgm){
    try{
      feverBgm.pause();
      feverBgm.currentTime = 0;
    }catch(e){}
    feverBgm = null;
  }
  feverUntil = 0;
  // ★ フィーバー中に大量に出た稲妻を消して即通常密度に戻す
  lightnings = [];
  lastSpawn = Date.now();
  // 通常BGMを再開（ゲーム中のみ）
  if(running && bgm){
    try{ bgm.play(); }catch(e){}
  }
}
function endFeverIfNeeded(){
  const t = performance.now();
  if(feverUntil <= 0) return;
  if(!feverBgm && t < feverUntil) return;
  if(t >= feverUntil) endFeverNow();
}

function makeEnemyByRule(){
  let kind;

  else if(spawnCount % 2 === 0 && Math.random() < 0.45) kind = "traffic";
  else kind = (Math.random() < 0.52) ? "pitfall" : "construction";

    type: "enemy",
    kind,
    x: canvas.width,
    y: groundY - h + yOffset, // ⭐ 地面より下に沈める
    w: spSpriteSize(70),
    h: h,
    rot: 0
  };
}
/* このゲームのレア枠を「1回ずつ」消化 */
function trySpawnPlannedEvent(){
  if(spawnCount < 6) return false;
  const t = performance.now();
  // フィーバーアイテム（このゲーム1回）
  if(gameEvent.fever && !used.fever){
    items.push({
      type:"item",
      key:"event_fever",
      x: canvas.width,
      y: groundY - 120,
      w: spSpriteSize(64),
      h: spSpriteSize(64)
    });
    used.fever = true;
    say("🌈 何か特別なものが…？",1000);
    return true;
  }
  if(t < feverUntil) return false;
  // 大⚡（10回に1回：このゲームで1回）
  if(gameEvent.bigLightning && !used.bigLightning){
    items.push(makeItem("lightningBig"));
    used.bigLightning = true;
    say("たまに大⚡きた！🎉", 1000);
    return true;
  }
  // 5回に1回枠（モード別）
  if(gameEvent.rare5 && !used.rare5){
    const rareKeys = MODE[mode].itemRare5;
    const pick = rareKeys[(playCount/5|0) % rareKeys.length];
    items.push(makeItem(pick));
    used.rare5 = true;
    if(mode==="ch"){
      if(pick==="ch_curry") say("今回は🍛来た！", 1000);
      else if(pick==="ch_station") say("今回は⛽来た！", 1000);
      else say("今日はレア！", 900);
    }else{
      if(pick==="mm_senbei") say("今回は🍘来た！", 1000);
      else if(pick==="mm_tea") say("今回は🍵来た！", 1000);
      else say("今日はレア！", 900);
    }
    return true;
  }
  return false;
}

        x: baseX + i*80,
        y: groundY + 20,
        w:spSpriteSize(50),h:spSpriteSize(50)
      });
    }
    return;
  }
  // ===== 縦ライン（ジャンプ用）
  if(r < 0.65){
    const maxHeight = isMobile() ? 120 : 80;
const y = groundY - 60 - Math.random()*maxHeight;
    for(let i=0;i<2;i++){
      lightnings.push({
        kind:"lightning",
        x: baseX,
        y: y - i * (isMobile() ? 80 : 40),
        w:spSpriteSize(50),h:spSpriteSize(50)
      });
    }
    return;
  }
  // ===== ななめライン（気持ちいい）
  if(r < 0.9){
    const maxHeight = isMobile() ? 120 : 80;
const startY = groundY - 60 - Math.random()*maxHeight;
    for(let i=0;i<3;i++){
      lightnings.push({
        kind:"lightning",
        x: baseX + i*70,
        y: startY - i*40,
        w:spSpriteSize(50),h:spSpriteSize(50)
      });
    }
    return;
  }
  // ===== 単発（普通）
  lightnings.push(makeLightning());
}
function spawn(){
  const now = Date.now();
  const t = performance.now();
  const inFever = (t < feverUntil);
  let interval = inFever ? 350 : 800;
  if(now - lastSpawn < interval) return;
  lastSpawn = now;
  spawnCount++;
  // まず「このゲームの予定」を出す
  if(trySpawnPlannedEvent()){
    enemySpawnStreak = 0;
    return;
  }
  // フィーバー中：敵なし＆⚡大量
  if(inFever){
    enemySpawnStreak = 0;
    lightnings.push(makeLightning());
    if(Math.random() < 0.35) lightnings.push(makeLightning());
    return;
  }
  // 通常：敵 or アイテム or ⚡
  const enemyChanceBase = 0.35;
  let enemyChance = (t < enemyRateDownUntil) ? 0.30 : enemyChanceBase;
  if(isMobile() && enemySpawnStreak >= 2){
    enemyChance = 0; // スマホは敵3連続を防ぐ
  }
  if(Math.random() < enemyChance){
    enemies.push(makeEnemyByRule());
    enemySpawnStreak++;
  }else{
    enemySpawnStreak = 0;
    const r = Math.random();
    const every = MODE[mode].itemEvery;
    if(mode==="ch"){
  if(r < 0.16) items.push(makeItem(every[0]));
  else if(r < 0.28) items.push(makeItem(every[1]));
  else if(r < 0.40) items.push(makeItem(every[2]));
  else if(r < 0.92) spawnLightningPattern();
  else spawnLightningPattern();
}
else{
  if(r < 0.22) items.push(makeItem(every[0]));
  else if(r < 0.44) items.push(makeItem(every[1]));
  else if(r < 0.92) spawnLightningPattern();
  else spawnLightningPattern();
}
  }
}

/* 更新 */
function update(delta){
  const t = performance.now();
  if((t - countdownStartAt) < COUNTDOWN_MS){
    // カウント中はゲーム進行を止める（表示だけ行う）
    return;
  }
  // カウントダウン終了後にゲームBGMを1回だけ開始
  if(pendingGameBgmSrc){
    const src = pendingGameBgmSrc;
    pendingGameBgmSrc = null;
    playBgm(src);
  }
  bgScrollX -= 2 * delta;
  if(!isMobile() && bgScrollX <= -canvas.width){
    bgScrollX = 0;
  }
// 物理
player.vy += gravity * delta;
if(isMobile()){
  // ⭐ 上昇中だけほんの少し伸ばす
  if(player.vy < 0){
    player.vy += gravity * -0.22 * delta;

  }
  // ⭐ 落下は今の速さを維持
  else{
    player.vy += gravity * 0.75 * delta;
  }
}
player.y += player.vy * delta;
  // 地面に吸着
  const playerGroundY = groundY + PLAYER_GROUND_OFFSET;
if(player.y > playerGroundY){
  if(player.vy > 6) fxLand(player.x + player.w/2, playerGroundY + player.h); // ★ 着地で潰れ＋砂煙
  player.y = playerGroundY;
  player.vy = 0;
}
  // スポーン
  spawn();
  // 速度
let curSpeed = BASE_SPEED;
// ⭐スマホ補正
if(isMobile()){
  curSpeed *= 0.95;
}
if(t < speedUntil) curSpeed *= 1.25;
if(t < slowUntil)  curSpeed *= 0.72;
// 移動（左へ流す）
lightnings.forEach(l => { l.x -= curSpeed * delta; });
items.forEach(it => { it.x -= curSpeed * delta; });
enemies.forEach(en => {
  en.x -= curSpeed * delta;
  if(en.kind === "construction"){
    en.rot += 0.06 * delta;
  }
});
  // +1ポップ
  popups.forEach(p => { p.y -= 0.6; p.life--; });
  popups = popups.filter(p => p.life > 0);
  // ⭐⚡取得（コンボ対応）
lightnings = lightnings.filter(l => {
  if(hit(player, l)){
    combo++;
    comboTimeout = performance.now() + 2000; // 2秒以内なら継続
    // ⭐ 3コンボ以上で表示
if(combo >= 3){
  comboText = combo + " COMBO!";
  comboTextUntil = performance.now() + 800;
}
    const addScore = 10 * combo;
    score += addScore;
    playSE("lightning");
    fxSparkle(l.x + l.w/2, l.y + l.h/2, combo>=5 ? "#ff8a3d" : "#ffe14d"); // ★ キラキラ
    // ⭐ キャラ上にポイント表示
    popups.push({
      x: player.x + player.w/2 - 10,
      y: player.y - 10,
      text: "+" + addScore,
      life: 40
    });
    if(Math.random() < 0.10) talk("lightning");
    return false;
  }
  return l.x > -60;
});
  // アイテム取得（モード別）
  items = items.filter(it=>{
  if(hit(player, it)){
    // 共通
    if(it.key === "lightningBig"){
      score += 50;
      playSE("lightning");
      talk("lightning");
      return false;
    }
    if(it.key === "event_fever"){
      playSE("itemRare");
      startFever();
      talk("fever");
      return false;
    }
    // ===== ch =====
    if(mode==="ch"){
      if(it.key === "ch_repair" || it.key === "ch_station"){
        playSE("itemCommon");
        const before = hp;
        hp = clamp(hp + 1, 0, 3);
        if(hp !== before){
          popHP();
          popups.push({
            x: player.x + player.w/2 + 10,
            y: player.y - 10,
            text: "+1",
            life: 40
          });
        }
        talk("heal");
        return false;
      }
      if(it.key === "ch_curry"){
        speedUntil = t + 4200;
        playSE("itemRare");
        talk("speed");
        return false;
      }
      if(it.key === "ch_compass"){
        enemyRateDownUntil = t + 5200;
        playSE("itemCommon");
        talk("enemyDown");
        return false;
      }
      if(it.key === "ch_map"){
        mapRevealUntil = t + 4800;
        playSE("itemCommon");
        talk("map");
        return false;
      }
    }
    // ===== mm =====
    if(mode==="mm"){
      if(it.key === "mm_onigiri"){
        playSE("itemCommon");
        const before = hp;
        hp = clamp(hp + 1, 0, 3);
        if(hp !== before){
          popHP();
          popups.push({
            x: player.x + player.w/2 + 10,
            y: player.y - 10,
            text: "+1",
            life: 40
          });
        }
        talk("heal");
        return false;
      }
      if(it.key === "mm_dango"){
        speedUntil = t + 4200;
        playSE("itemCommon");
        talk("speed");
        return false;
      }
      if(it.key === "mm_tea"){
        enemyRateDownUntil = t + 5200;
        playSE("itemRare");
        talk("enemyDown");
        return false;
      }
      if(it.key === "mm_senbei"){
        shieldUntilHit = true;
        playSE("itemCommon");
        talk("guard");
        return false;
      }
    }
    return false;
  }
  return it.x > -90;
});
  // 敵衝突
  enemies = enemies.filter(en=>{
    if(hitEnemy(player, en)){
      // フィーバー中は敵が出ない設計だが念のため
      if(t < feverUntil) return false;
      // mmの🍘ガード
      if(mode==="mm" && shieldUntilHit){
        shieldUntilHit = false;
        playSE("itemCommon"); // ガード音（好みで差し替えOK）
        talk("guard");
        return false;
      }
      flashDamage();
      shakeUntil = t + 220;
      fxHit(player.x + player.w/2, player.y + player.h/2); // ★ 被弾の破片
      popHP();
      if(en.kind === "traffic"){
        slowUntil = t + 3000;
        playSE("hitTraffic");
        talk("damage");
        return false;
      }
      // ダメージ
      hp = clamp(hp - 1, 0, 3);
      talk("damage");
      if(en.kind === "pitfall"){
        playSE("hitPitfall");
        sinkUntil = t + 650;
      }else if(en.kind === "construction"){
        playSE("hitConstruction");
        starsUntil = t + 900;
        starsAngle = 0;
      }else if(en.kind === "trouble"){
        playSE("hitTrouble");
        shakeUntil = t + 320;
      }else{
        // 念のため
        playSE("hitTrouble");
      }
      return false;
    }
    return en.x > -120;
  });
  // フィーバー終わり
  endFeverIfNeeded();
  fxUpdate(delta); // ★ 演出の更新
// ⭐ コンボリセット
if(performance.now() > comboTimeout){
  combo = 0;
  comboText = "";
}
if(lightnings.length > 25) lightnings.splice(0,5);
if(items.length > 20) items.splice(0,5);
if(enemies.length > 20) enemies.splice(0,5);
  const remain = GAME_MS - getGameElapsedMs();
if(hp <= 0) finish(false);
else if(remain <= 0) finish(true);
}

function drawScrollingTileX(img, y, w, h, scrollX, baseX=0){
  if(!img || w <= 0 || h <= 0) return;
  const tileW = Math.max(1, w);
  let offset = scrollX % tileW;
  if(offset > 0) offset -= tileW;
  for(let x = baseX + offset - tileW; x < canvas.width + tileW; x += tileW){
    // サブピクセルで継ぎ目が見えやすいので、丸め＋1px重ねて描く
    const dx = Math.round(x);
    const dw = Math.ceil(w) + 1;
    ctx.drawImage(img, dx, y, dw, h);
  }
}

const trimCache = new WeakMap();
function getTrimRect(img){
  const cached = trimCache.get(img);
  if(cached) return cached;
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  const c = document.createElement("canvas");
  c.width = w;
  c.height = h;
  const ictx = c.getContext("2d", { willReadFrequently: true });
  ictx.drawImage(img, 0, 0, w, h);
  const data = ictx.getImageData(0, 0, w, h).data;
  let minX = w, minY = h, maxX = -1, maxY = -1;
  for(let y=0; y<h; y++){
    for(let x=0; x<w; x++){
      const i = (y*w + x) * 4;
      const a = data[i+3];
      if(a < 8) continue;
      const r = data[i], g = data[i+1], b = data[i+2];
      const nearWhite = (r > 235 && g > 235 && b > 235);
      if(nearWhite) continue;
      if(x < minX) minX = x;
      if(y < minY) minY = y;
      if(x > maxX) maxX = x;
      if(y > maxY) maxY = y;
    }
  }
  const rect = (maxX >= minX && maxY >= minY)
    ? { sx:minX, sy:minY, sw:maxX-minX+1, sh:maxY-minY+1 }
    : { sx:0, sy:0, sw:w, sh:h };
  trimCache.set(img, rect);
  return rect;
}
function drawCoverToRect(media, dx, dy, dw, dh, srcRect=null){
  const mw = media.videoWidth || media.naturalWidth || 0;
  const mh = media.videoHeight || media.naturalHeight || 0;
  if(!mw || !mh) return null;
  let sx = 0;
  let sy = 0;
  let sw = mw;
  let sh = mh;
  if(srcRect){
    sx = srcRect.sx;
    sy = srcRect.sy;
    sw = srcRect.sw;
    sh = srcRect.sh;
  }
  // object-fit: cover 相当（余白なし）
  const scale = Math.max(dw / sw, dh / sh);
  const cropW = dw / scale;
  const cropH = dh / scale;
  const cx = sx + (sw - cropW) / 2;
  const cy = sy + (sh - cropH) / 2;
  ctx.drawImage(media, cx, cy, cropW, cropH, dx, dy, dw, dh);
  return {x:dx,y:dy,w:dw,h:dh};
}

function drawCenteredLayer(imgObj, maxRatio=0.96, trimWhite=false, yOffsetRatio=0, cropOverride=null){
  if(!imgObj?.ok) return null;
  const iw = imgObj.img.naturalWidth;
  const ih = imgObj.img.naturalHeight;
  if(!iw || !ih) return null;
  let src;
  if(cropOverride){
    src = {
      sx: Math.floor(iw * cropOverride.x),
      sy: Math.floor(ih * cropOverride.y),
      sw: Math.floor(iw * cropOverride.w),
      sh: Math.floor(ih * cropOverride.h)
    };
  }else{
    src = trimWhite ? getTrimRect(imgObj.img) : { sx:0, sy:0, sw:iw, sh:ih };
  }
  const scale = Math.min((canvas.width * maxRatio) / src.sw, (canvas.height * maxRatio) / src.sh);
  const w = src.sw * scale;
  const h = src.sh * scale;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2 + canvas.height * yOffsetRatio;
  ctx.drawImage(imgObj.img, src.sx, src.sy, src.sw, src.sh, x, y, w, h);
  return {x,y,w,h};
}
function drawStar(ctx, x, y, spikes, outerRadius, innerRadius){
  let rot = Math.PI / 2 * 3;
  let step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(x, y - outerRadius);
  for(let i=0; i<spikes; i++){
    ctx.lineTo(x + Math.cos(rot) * outerRadius, y + Math.sin(rot) * outerRadius);
    rot += step;
    ctx.lineTo(x + Math.cos(rot) * innerRadius, y + Math.sin(rot) * innerRadius);
    rot += step;
  }
  ctx.lineTo(x, y - outerRadius);
  ctx.closePath();
  ctx.fillStyle = "rgba(255, 200, 0, .95)";
  ctx.strokeStyle = "rgba(255, 140, 0, .95)";
  ctx.lineWidth = 2;
  ctx.fill(); ctx.stroke();
}
function roundRect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  if(ctx.roundRect){
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    return;
  }
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

            const bob = -hop * (p.h * 0.05);            // 上に跳ねる
            const squash = (1 - hop) * 0.06;            // 接地時に潰れる
            const sx = 1 + squash;
            const sy = 1 - squash;
            const lcx = p.x + p.w/2;

/* =========================================================
  ★ 演出強化モジュール（追加・新規アセット不要）
  - fxSparkle : ⚡取得のキラキラ＋発光リング
  - fxHit     : 被弾の破片＋赤リング
  - fxJump / fxLand : スカッシュ＆ストレッチ＋着地の砂煙
  - fxUpdate / fxDrawWorld : 毎フレーム更新＆描画（粒子/紙吹雪/スピードライン）
========================================================= */
let fxParticles = [];
let fxPlayerStretch = 0; // +で縦伸び / -で潰れ。時間で0へ減衰
let fxConfettiAcc = 0;
function fxRand(a,b){ return a + Math.random()*(b-a); }
function fxSpawn(p){
  fxParticles.push(p);
  if(fxParticles.length > 280) fxParticles.splice(0, 40);
}
// ⚡取得など：キラキラ放射＋発光リング
function fxSparkle(x, y, color){
  for(let i=0;i<10;i++){
    const a = Math.random()*Math.PI*2;
    const sp = fxRand(1.5, 5);
    fxSpawn({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 1,
      life: 1, decay: fxRand(0.02,0.05),
      size: fxRand(3,7), color: color || "#ffe14d",
      grav: 0.12, shape: "spark"
    });
  }
  fxSpawn({ ring:true, x, y, life:1, decay:0.06, size:10, grow:5, color: color || "#ffffff" });
}
// 被弾：破片＋赤リング
function fxHit(x, y){
  for(let i=0;i<14;i++){
    const a = Math.random()*Math.PI*2;
    const sp = fxRand(2,7);
    fxSpawn({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 2,
      life:1, decay: fxRand(0.025,0.05),
      size: fxRand(3,6),
      color: (Math.random()<0.5) ? "#ff5a4d" : "#ffffff",
      grav: 0.25, shape: "shard"
    });
  }
  fxSpawn({ ring:true, x, y, life:1, decay:0.08, size:14, grow:7, color:"#ff5a4d" });
}
// 着地の砂煙
function fxDust(x, y){
  for(let i=0;i<8;i++){
    fxSpawn({
      x: x + fxRand(-12,12), y,
      vx: fxRand(-2.2,2.2), vy: fxRand(-1.5,-0.2),
      life:1, decay: fxRand(0.04,0.07),
      size: fxRand(5,10), color:"rgba(120,120,120,1)",
      grav:0.04, shape:"dust"
    });
  }
}
function fxJump(){ fxPlayerStretch = 0.22; }              // ジャンプで縦伸び
function fxLand(x, y){ fxPlayerStretch = -0.22; fxDust(x, y); } // 着地で潰れ＋砂煙
function fxUpdate(delta){
  const d = delta || 1;
  for(let i=fxParticles.length-1;i>=0;i--){
    const p = fxParticles[i];
    if(p.ring){
      p.size += (p.grow||4)*d;
      p.life -= p.decay*d;
      if(p.life<=0) fxParticles.splice(i,1);
      continue;
    }
    p.vy += (p.grav||0)*d;
    p.x += p.vx*d;
    p.y += p.vy*d;
    if(p.shape==="confetti") p.rot += (p.vr||0)*d;
    p.life -= p.decay*d;
    if(p.life<=0) fxParticles.splice(i,1);
  }
  // スカッシュ＆ストレッチ減衰
  fxPlayerStretch *= Math.pow(0.82, d);
  if(Math.abs(fxPlayerStretch) < 0.005) fxPlayerStretch = 0;
  // フィーバー中：紙吹雪
  if(typeof feverUntil !== "undefined" && performance.now() < feverUntil){
    fxConfettiAcc += d;
    if(fxConfettiAcc >= 2){
      fxConfettiAcc = 0;
      const cols = ["#ff5a5a","#ffd93b","#5ad27a","#4db8ff","#b07bff"];
      fxSpawn({
        x: fxRand(0, canvas.width), y: -10,
        vx: fxRand(-1,1), vy: fxRand(2,4),
        life:1, decay:0.012, size:fxRand(5,9),
        color: cols[(Math.random()*cols.length)|0],
        grav:0.02, shape:"confetti", rot:Math.random()*Math.PI, vr:fxRand(-0.2,0.2)
      });
    }
  }
}
function fxDrawWorld(){
  const now = performance.now();
  // 加速中：スピードライン
  if(typeof speedUntil !== "undefined" && now < speedUntil){
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    for(let i=0;i<6;i++){
      const y = ((now*0.5 + i*97) % canvas.height);
      const len = 60 + (i%3)*30;
      const x = (canvas.width - ((now*1.2 + i*160) % (canvas.width+200)));
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x+len, y);
      ctx.stroke();
    }
    ctx.restore();
  }
  // 粒子
  ctx.save();
  for(const p of fxParticles){
    const a = Math.max(0, Math.min(1, p.life));
    if(p.ring){
      ctx.globalAlpha = a*0.7;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.stroke();
      continue;
    }
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    if(p.shape==="confetti"){
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot||0);
      ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.66);
      ctx.restore();
    }else if(p.shape==="dust"){
      ctx.globalAlpha = a*0.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }else{
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
}
// =========================================================
//  ★ スマホ用「枠組みレイアウト」（参考イメージ準拠）
//  装飾背景（コード描画）＋ 中央パネルにシーン画像 ＋ 上にタイトル
//  ※数値はここで調整できる
// =========================================================
const SP_PANEL_W   = 0.94; // パネル幅（canvas幅比）※左右ギリギリ＋少し余白
const SP_BOTTOM_AREA = 0.34; // 下部ボタン領域（パネルとボタンの余白を確保）
const SP_PANEL_AR = 0.889;   // パネルの縦横比（高さ/幅）
function getSpPanelTopRatio(){
  // 埋め込み時はタイトル無し＝上余白を小さく
  return IS_EMBED ? 0.03 : 0.11;
}
function isLandscapeStage(){ return canvas.width > canvas.height * 1.1; }
function getSpPanelRect(){
  const topR = getSpPanelTopRatio();
  const landscape = isLandscapeStage();
  // 横長は下部ボタン領域を少なめに（ボタンは中間配置のため）
  const bottomReserve = landscape ? 0.22 : SP_BOTTOM_AREA;
  const availH = canvas.height * (1 - topR - bottomReserve);
  let w, h;
  if(landscape){
    // PC/横長：16:9でほぼ全幅、ただし高さが収まらなければ縮める
    w = canvas.width * 0.96;
    h = w * (9/16);
    if(h > availH){ h = availH; w = h * (16/9); }
    if(w > canvas.width * 0.96){ w = canvas.width * 0.96; h = w * (9/16); }
  }else{
    // スマホ/縦長：ほぼ正方形パネル
    w = canvas.width * SP_PANEL_W;
    h = w * SP_PANEL_AR;
    if(h > availH){ h = availH; w = h / SP_PANEL_AR; }
    const maxW = canvas.width * 0.96;
    if(w > maxW){ w = maxW; h = w * SP_PANEL_AR; }
  }
  const x = (canvas.width - w) / 2;
  const y = canvas.height * topR + Math.max(0, (availH - h) / 2);
  return { x, y, w, h };
}

    if(flip){
      ctx.save();
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      ctx.drawImage(imgObj.img, 0, 0, w, h);
      ctx.restore();
    }else{
      ctx.drawImage(imgObj.img, x, y, w, h);
    }
  };
  place(I.mm_player, p.x + p.w * 0.16, false);      // 左：ミラまる
  place(I.ch_player, p.x + p.w * 0.84, true);       // 右：チャーすけ（内向き）
}
// ---- コード描画パネルの共通部品 ----
// 中身を自前で描くための白カード（シーン画像は使わない）
function drawSpBlankPanel(p, bg){
  const r = Math.min(p.w, p.h) * 0.06;
  ctx.save();
  ctx.shadowColor = "rgba(60,80,110,0.22)";
  ctx.shadowBlur = 26;
  ctx.shadowOffsetY = 12;
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.restore();
  const pad = Math.min(p.w, p.h) * 0.025;
  roundRect(ctx, p.x + pad, p.y + pad, p.w - pad*2, p.h - pad*2, r * 0.7);
  ctx.fillStyle = bg || "#eaf6ff";
  ctx.fill();
  ctx.lineWidth = Math.max(4, p.w * 0.012);
  ctx.strokeStyle = "rgba(255,255,255,0.92)";
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.stroke();
}
// ★ 街並みパネルを横スクロールさせて描く（プレイ画面用）
function drawScrollScenePanel(p, imgObj, scrollX){
  const r = Math.min(p.w, p.h) * 0.06;
  ctx.save();
  ctx.shadowColor = "rgba(60,80,110,0.22)";
  ctx.shadowBlur = 26;
  ctx.shadowOffsetY = 12;
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.restore();
  const pad = Math.min(p.w, p.h) * 0.025;
  const ix = p.x + pad, iy = p.y + pad, iw = p.w - pad*2, ih = p.h - pad*2;
  ctx.save();
  roundRect(ctx, ix, iy, iw, ih, r*0.7);
  ctx.clip();
  if(imgObj?.ok){
    const s = Math.max(iw / imgObj.img.naturalWidth, ih / imgObj.img.naturalHeight);
    const dw = imgObj.img.naturalWidth * s;
    const dh = imgObj.img.naturalHeight * s;
    const oy = iy + (ih - dh) / 2;
    let off = scrollX % dw;
    if(off > 0) off -= dw;
    for(let x = ix + off; x < ix + iw; x += dw){
      ctx.drawImage(imgObj.img, Math.round(x), oy, Math.ceil(dw) + 1, dh);
    }
  }else{
    ctx.fillStyle = "#bbdfff";
    ctx.fillRect(ix, iy, iw, ih);
  }
  ctx.restore();
  ctx.lineWidth = Math.max(4, p.w * 0.012);
  ctx.strokeStyle = "rgba(255,255,255,0.92)";
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.stroke();
}
// ★ 結果画面の紙吹雪（スコア確定で発火）
function spawnEndConfetti(p){
  endConfetti = [];
  const cols = ["#ff5a5a","#ffd93b","#5ad27a","#4db8ff","#b07bff","#ff8ad6"];
  for(let i=0;i<100;i++){
    endConfetti.push({
      x: p.x + Math.random()*p.w,
      y: p.y - Math.random()*p.h*0.6,
      vx: (Math.random()-0.5)*2,
      vy: 2 + Math.random()*3.5,
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.35,
      size: 7 + Math.random()*9,
      color: cols[(Math.random()*cols.length)|0]
    });
  }
}
function drawEndConfetti(p){
  if(!endConfetti.length) return;
  ctx.save();
  for(const c of endConfetti){
    c.x += c.vx; c.y += c.vy; c.vy += 0.02; c.rot += c.vr;
    // ★ 下に出たら上へ戻して常時降らせる
    if(c.y > p.y + p.h + 30){
      c.y = p.y - Math.random() * p.h * 0.4;
      c.x = p.x + Math.random() * p.w;
      c.vy = 1.5 + Math.random() * 2.5;
      c.vx = (Math.random() - 0.5) * 2;
    }
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size/2, -c.size/3, c.size, c.size*0.66);
    ctx.restore();
  }
  ctx.restore();
}
// ★ フィーバー：回転する虹色サンバースト（プレイヤー背後）
function drawFeverRays(cx, cy, t){
  const colors = ["#ff5a5a","#ffb347","#ffe14d","#5ad27a","#4db8ff","#b07bff"];
  const n = 14;
  const R = canvas.width * 0.95;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.globalAlpha = 0.22 + 0.06 * Math.sin(t * 0.01); // ゆらぎ
  ctx.translate(cx, cy);
  ctx.rotate(t * 0.0014);
  const step = (Math.PI * 2) / n;
  const half = step * 0.46;
  for(let i=0;i<n;i++){
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(-half) * R, Math.sin(-half) * R);
    ctx.lineTo(Math.cos(half) * R, Math.sin(half) * R);
    ctx.closePath();
    ctx.fill();
    ctx.rotate(step);
  }
  ctx.restore();
}
// ★ タイトルのデモ用：⚡やアイテムが流れる（装飾のみ）
function drawTitleDecoItems(p){
  const now = performance.now();
  if(now - titleDecoLastSpawn > titleDecoGap){
    titleDecoLastSpawn = now;
    titleDecoGap = 1100 + Math.random()*1900; // 次は1.1〜3.0秒後（ランダム・少なめ）
    const pool = ["lightning","lightning","ch_repair","ch_curry","mm_onigiri","mm_dango","ch_map"];
    const key = pool[(Math.random()*pool.length)|0];
    const land = isLandscapeStage();
    const size = p.w * (key === "lightning" ? (land ? 0.05 : 0.073) : (land ? 0.066 : 0.096)); // プレイ中と同じサイズ感
    titleDeco.push({
      key,
      x: p.x + p.w + size,
      y: p.y + p.h * (0.28 + Math.random()*0.32),
      size
    });
  }
  const r = Math.min(p.w, p.h) * 0.06;
  const pad = Math.min(p.w, p.h) * 0.025;
  ctx.save();
  roundRect(ctx, p.x + pad, p.y + pad, p.w - pad*2, p.h - pad*2, r*0.7);
  ctx.clip();
  const speed = p.w * 0.006;
  for(const d of titleDeco){
    d.x -= speed;
    const img = I[d.key];
    if(img?.ok) ctx.drawImage(img.img, d.x - d.size/2, d.y - d.size/2, d.size, d.size);
  }
  ctx.restore();
  titleDeco = titleDeco.filter(d => d.x > p.x - d.size*2);
}
// ★ タイトルのキャラ（プレイ中と同じぷにっと＋走り跳ね）
function drawTitleMascot(imgObj, cx, cyBase, w, h, phase){
  const t = performance.now();
  const pulse = 1 + Math.sin(t * 0.015 + phase) * 0.05;
  const idleHop = Math.abs(Math.sin(t * 0.011 + phase)) * (h * 0.06);
  // ★ たまにジャンプ（キャラごとにタイミングをずらす）
  const cycle = 2800;
  const tp = (t + phase * 1300) % cycle;
  let jump = 0;
  if(tp < 540){
    jump = Math.sin((tp / 540) * Math.PI) * (h * 0.55);
  }
  const cy = cyBase - idleHop - jump;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.translate(-cx, -cy);
  drawMascotIn(imgObj, cx, cy, w, h);
  ctx.restore();
}
// TIMEバッジ（コード描画）
function drawTimeBadge(sec, centerY){
  const w = canvas.width * 0.26;
  const h = canvas.height * 0.065;
  const x = (canvas.width - w) / 2;
  const y = (centerY != null ? centerY : canvas.height * 0.1325) - h/2;
  const low = sec <= 10;
  const r = h * 0.5;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.2)";
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;
  roundRect(ctx, x, y, w, h, r);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.lineWidth = Math.max(3, h * 0.10);
  ctx.strokeStyle = low ? "#ff5a5a" : "#5193ff";
  roundRect(ctx, x, y, w, h, r);
  ctx.stroke();
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.fillStyle = low ? "#ff5a5a" : "#5193ff";
  ctx.font = `900 ${Math.floor(h*0.40)}px system-ui,-apple-system,sans-serif`;
  ctx.fillText("TIME", x + h*0.38, y + h/2 + 1);
  ctx.textAlign = "right";
  ctx.fillStyle = "#37475a";
  ctx.font = `900 ${Math.floor(h*0.56)}px system-ui,-apple-system,sans-serif`;
  ctx.fillText(String(sec), x + w - h*0.38, y + h/2 + 1);
  ctx.restore();
}
// マスコットを指定ボックス内に収めて中央描画
function drawMascotIn(imgObj, cx, cy, maxW, maxH){
  if(!imgObj?.ok) return;
  const iw = imgObj.img.naturalWidth, ih = imgObj.img.naturalHeight;
  if(!iw || !ih) return;
  const s = Math.min(maxW / iw, maxH / ih);
  const w = iw * s, h = ih * s;
  ctx.drawImage(imgObj.img, cx - w/2, cy - h/2, w, h);
}
// アウトライン付きテキスト
function drawSpText(text, x, y, size, color, stroke){
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = `900 ${size}px system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif`;
  if(stroke){
    ctx.lineWidth = Math.max(3, size * 0.16);
    ctx.lineJoin = "round";
    ctx.strokeStyle = stroke;
    ctx.strokeText(text, x, y);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}
// コース選択（コード描画：左ミラまる / 右チャーすけ）
function drawCourseContent(p){
  drawSpText("コースをえらぶ", p.x + p.w/2, p.y + p.h*0.10, p.h*0.07, "#ff861f", "#ffffff");
  const cardW = p.w * 0.40, cardH = p.h * 0.62;
  const cy = p.y + p.h * 0.54;
  const cards = [
    { key:"mm", img:I.mm_player, name:"ミラまる", cx:p.x + p.w*0.28 },
    { key:"ch", img:I.ch_player, name:"チャーすけ", cx:p.x + p.w*0.72 }
  ];
  cards.forEach(c=>{
    const x = c.cx - cardW/2, y = cy - cardH/2;
    const sel = (mode === c.key);
    const r = cardW * 0.12;
    ctx.save();
    roundRect(ctx, x, y, cardW, cardH, r);
    ctx.fillStyle = sel ? "#fff3df" : "#ffffff";
    ctx.fill();
    ctx.lineWidth = sel ? Math.max(5, cardW*0.045) : Math.max(2, cardW*0.015);
    ctx.strokeStyle = sel ? "#ff8a1f" : "rgba(0,0,0,0.12)";
    roundRect(ctx, x, y, cardW, cardH, r);
    ctx.stroke();
    ctx.restore();
    drawMascotIn(c.img, c.cx, y + cardH*0.40, cardW*0.72, cardH*0.52);
    drawSpText(c.name, c.cx, y + cardH*0.84, cardH*0.12, "#37475a", null);
  });
}
// 決定後のスタート画面（コード描画）
function drawStartContent(p){
  const isCh = (mode === "ch");
  const img = isCh ? I.ch_player : I.mm_player;
  const name = isCh ? "チャーすけ" : "ミラまる";
  drawSpText(name + "コース", p.x + p.w/2, p.y + p.h*0.14, p.h*0.08, "#ff861f", "#ffffff");
  drawMascotIn(img, p.x + p.w/2, p.y + p.h*0.50, p.w*0.55, p.h*0.5);
  drawSpText("スタートでゲーム開始！", p.x + p.w/2, p.y + p.h*0.84, p.h*0.055, "#37475a", null);
}
// 星の輪郭を1つ描く
function drawStarOutline(cx, cy, R){
  const r = R * 0.45;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const ao = -Math.PI/2 + i*(Math.PI*2/5);
    const ai = ao + Math.PI/5;
    if(i===0) ctx.moveTo(cx + Math.cos(ao)*R, cy + Math.sin(ao)*R);
    else ctx.lineTo(cx + Math.cos(ao)*R, cy + Math.sin(ao)*R);
    ctx.lineTo(cx + Math.cos(ai)*r, cy + Math.sin(ai)*r);
  }
  ctx.closePath();
  ctx.stroke();
}
// 周りの装飾背景（淡い星模様タイル）
function drawSpDecoBackground(){
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0, "#cfeafe");
  g.addColorStop(1, "#eafaf0");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.strokeStyle = "rgba(120,175,225,0.42)";
  ctx.lineWidth = 3;
  const tile = canvas.width * 0.17;
  const R = tile * 0.13;
  let row = 0;
  for(let yy = tile*0.25; yy < canvas.height; yy += tile){
    const offset = (row % 2) ? tile/2 : 0;
    for(let xx = tile*0.3 + offset; xx < canvas.width; xx += tile){
      drawStarOutline(xx, yy, R);
    }
    row++;
  }
  ctx.restore();
}
// 中央パネル（白フレーム＋角丸）にシーン画像をcoverで収める
function drawSpScenePanel(p, imgObj){
  const r = Math.min(p.w, p.h) * 0.06;
  ctx.save();
  ctx.shadowColor = "rgba(60,80,110,0.22)";
  ctx.shadowBlur = 26;
  ctx.shadowOffsetY = 12;
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.restore();
  const pad = Math.min(p.w, p.h) * 0.025;
  const ix = p.x + pad, iy = p.y + pad, iw = p.w - pad*2, ih = p.h - pad*2;
  ctx.save();
  roundRect(ctx, ix, iy, iw, ih, r*0.7);
  ctx.clip();
  if(imgObj?.ok){
    const s = Math.max(iw / imgObj.img.naturalWidth, ih / imgObj.img.naturalHeight);
    const dw = imgObj.img.naturalWidth * s;
    const dh = imgObj.img.naturalHeight * s;
    ctx.drawImage(imgObj.img, ix + (iw-dw)/2, iy + (ih-dh)/2, dw, dh);
  }else{
    ctx.fillStyle = "#bbdfff";
    ctx.fillRect(ix, iy, iw, ih);
  }
  ctx.restore();
  ctx.lineWidth = Math.max(4, p.w * 0.012);
  ctx.strokeStyle = "rgba(255,255,255,0.92)";
  roundRect(ctx, p.x, p.y, p.w, p.h, r);
  ctx.stroke();
}
// =========================================================
//  ★ タイトルロゴ重ね描き（ロゴ無し背景の上に新ロゴ）
//  title_logo.png が読み込めた時だけ描画。ゆったり上下に揺れる。
// =========================================================
function drawTitleLogo(){
  if(IS_EMBED || isLandscapeStage()) return; // 埋め込み/横長(PC)はヘッダー側 or パネル内に置くので上には描かない
  const lg = I.title_logo;
  if(!lg?.ok) return;
  const iw = lg.img.naturalWidth;
  const ih = lg.img.naturalHeight;
  if(!iw || !ih) return;
  const t = performance.now();
  const bob = Math.sin(t * 0.0018) * (canvas.height * 0.012); // ふわっと上下
  const maxW = canvas.width * (isMobile() ? 0.56 : 0.64);
  const scale = maxW / iw;
  const w = iw * scale;
  const h = ih * scale;
  const x = (canvas.width - w) / 2;
  const y = canvas.height * (isMobile() ? 0.015 : 0.06) + bob;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.18)";
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 6;
  ctx.drawImage(lg.img, x, y, w, h);
  ctx.restore();
}
// =========================================================
//  ★ 著作権表記（全画面・PC/スマホ共通で最下部に描画）
// =========================================================
function drawCopyright(){
  const text = "@2026 Miraiz ENECHANGE Ltd 著作 ミライズエネチェンジ株式会社";
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "#8f9bab"; // 控えめなクールグレー（注釈向け）
  let fs = Math.round(canvas.width * (isLandscapeStage() ? 0.014 : 0.022));
  const font = (s)=>`700 ${s}px system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif`;
  ctx.font = font(fs);
  // 横幅に収まるよう自動縮小
  while(ctx.measureText(text).width > canvas.width * 0.96 && fs > 8){
    fs -= 1;
    ctx.font = font(fs);
  }
  const y = canvas.height * (isMobile() ? 0.99 : 0.985); // 下に少し余白
  ctx.fillText(text, canvas.width / 2, y);
  ctx.restore();
}
